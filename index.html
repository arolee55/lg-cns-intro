<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>사칙연산 계산기</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="experience" aria-label="계산기 소개와 실행 영역">
        <section class="intro" aria-labelledby="intro-title">
          <img
            class="intro__image"
            src="calculator-illustration.svg"
            width="480"
            height="360"
            alt="숫자 버튼과 연산 기호가 있는 간단한 계산기 그림"
          />
          <p class="intro__eyebrow">Quick Math</p>
          <h1 id="intro-title">간단한 사칙연산 계산기</h1>
          <p class="intro__text">
            덧셈, 뺄셈, 곱셈, 나눗셈을 깔끔하게 처리하는 웹 계산기입니다. 버튼과 키보드 입력을
            모두 지원해 간단한 계산을 빠르게 끝낼 수 있습니다.
          </p>
        </section>

        <section class="calculator" aria-label="사칙연산 계산기">
          <header class="calculator__header">
            <h2>Calculator</h2>
            <span class="status-dot" aria-hidden="true"></span>
          </header>

          <section class="display" aria-live="polite">
            <div class="display__history" id="history">&nbsp;</div>
            <output class="display__value" id="display">0</output>
          </section>

          <section class="keys" aria-label="계산기 버튼">
            <button class="key key--utility" type="button" data-action="clear">AC</button>
            <button class="key key--utility" type="button" data-action="delete" aria-label="한 자리 지우기">&#9003;</button>
            <button class="key key--utility" type="button" data-action="toggle-sign" aria-label="양수 음수 전환">&plusmn;</button>
            <button class="key key--operator" type="button" data-operator="divide" aria-label="나누기">&divide;</button>

            <button class="key" type="button" data-number="7">7</button>
            <button class="key" type="button" data-number="8">8</button>
            <button class="key" type="button" data-number="9">9</button>
            <button class="key key--operator" type="button" data-operator="multiply" aria-label="곱하기">&times;</button>

            <button class="key" type="button" data-number="4">4</button>
            <button class="key" type="button" data-number="5">5</button>
            <button class="key" type="button" data-number="6">6</button>
            <button class="key key--operator" type="button" data-operator="subtract" aria-label="빼기">&minus;</button>

            <button class="key" type="button" data-number="1">1</button>
            <button class="key" type="button" data-number="2">2</button>
            <button class="key" type="button" data-number="3">3</button>
            <button class="key key--operator" type="button" data-operator="add" aria-label="더하기">+</button>

            <button class="key key--wide" type="button" data-number="0">0</button>
            <button class="key" type="button" data-action="decimal" aria-label="소수점">.</button>
            <button class="key key--equals" type="button" data-action="calculate" aria-label="계산하기">=</button>
          </section>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
