  <rect x="140" y="274" width="101" height="28" rx="10" fill="#d7e6e2" />
  <rect x="258" y="274" width="101" height="28" rx="10" fill="#e96f5f" />
  <g fill="#19212a" font-family="Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle" dominant-baseline="middle">
