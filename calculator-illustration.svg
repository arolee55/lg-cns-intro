    </linearGradient>
    <linearGradient id="screen" x1="150" y1="72" x2="310" y2="132" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#dff7f2" />
      <stop offset="1" stop-color="#9ee6da" />
    </linearGradient>
  </defs>
  <rect x="86" y="42" width="308" height="276" rx="36" fill="#d6e5e9" />
  <rect x="110" y="30" width="260" height="294" rx="34" fill="url(#body)" />
  <rect x="138" y="62" width="204" height="72" rx="16" fill="url(#screen)" />
  <rect x="174" y="96" width="132" height="12" rx="6" fill="#263745" opacity="0.72" />
  <g fill="#e7edf3">
    <rect x="140" y="158" width="42" height="42" rx="10" />
    <rect x="199" y="158" width="42" height="42" rx="10" />
    <rect x="258" y="158" width="42" height="42" rx="10" />
    <rect x="140" y="216" width="42" height="42" rx="10" />
    <rect x="199" y="216" width="42" height="42" rx="10" />
    <rect x="258" y="216" width="42" height="42" rx="10" />
  </g>
  <g fill="#f5bf4f">
    <rect x="317" y="158" width="42" height="42" rx="10" />
