<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" role="img" aria-labelledby="title desc">
  <title id="title">Simple calculator illustration</title>
  <desc id="desc">A compact calculator with colorful operation keys.</desc>
  <defs>
    <linearGradient id="body" x1="110" y1="40" x2="360" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#293746" />
