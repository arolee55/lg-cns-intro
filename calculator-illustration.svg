  <path d="M388 82l18 10 18-10-10 18 10 18-18-10-18 10 10-18-10-18z" fill="#67d4c4" />
  <circle cx="82" cy="264" r="18" fill="#e96f5f" opacity="0.9" />
  <circle cx="402" cy="276" r="11" fill="#f5bf4f" />
